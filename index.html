<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>গল্পের আসর — বাংলা গল্প</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* ===== CSS VARIABLES & RESET ===== */
    :root {
      --bg-primary: #0f0f13; --bg-secondary: #1a1a24; --bg-card: #1e1e2e;
      --accent: #f97316; --accent-glow: rgba(249, 115, 22, 0.2); 
      --text-primary: #f1f0ee; --text-secondary: #9d9ab0; --border: rgba(255, 255, 255, 0.08);
      --font-bangla: 'Hind Siliguri', sans-serif; --font-display: 'Kalam', cursive;
      --radius: 12px; --transition: all 0.3s ease;
    }
    [data-theme="light"] {
      --bg-primary: #faf9f7; --bg-secondary: #f0ede8; --bg-card: #ffffff;
      --text-primary: #1a1714; --text-secondary: #5c5750; --border: rgba(0, 0, 0, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-bangla); background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; transition: background 0.3s, color 0.3s; }
    button { cursor: pointer; font-family: inherit; border: none; background: transparent; }
    
    /* ===== NAVBAR ===== */
    .navbar { position: sticky; top: 0; background: rgba(15,15,19,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 20px; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
    [data-theme="light"] .navbar { background: rgba(250,249,247,0.9); }
    .logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .logo span { color: var(--text-primary); }
    .theme-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); font-size: 1.2rem;}

    /* ===== HOME VIEW ===== */
    #home-view { padding: 20px; max-width: 1000px; margin: 0 auto; }
    .hero { text-align: center; padding: 40px 0; }
    .hero h1 { font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 10px; }
    .hero p { color: var(--text-secondary); font-size: 0.95rem; }

    /* Search & Filter (App Like) */
    .search-box { width: 100%; padding: 14px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 50px; color: var(--text-primary); font-size: 1rem; margin-bottom: 20px; outline: none;}
    .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    
    .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; margin-bottom: 30px; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-tab { flex-shrink: 0; padding: 8px 20px; border-radius: 50px; border: 1px solid var(--border); color: var(--text-secondary); background: var(--bg-card); font-weight: 500; }
    .filter-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* Grid & Cards */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.2s; }
    .card:active { transform: scale(0.98); }
    .card-img { width: 100%; height: 180px; object-fit: cover; }
    .card-content { padding: 15px; }
    .card-tag { font-size: 0.75rem; background: var(--accent-glow); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: 600; display: inline-block; margin-bottom: 8px; }
    .card-title { font-size: 1.1rem; margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
    .card-desc { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ===== STORY VIEW ===== */
    #story-view { display: none; max-width: 800px; margin: 0 auto; padding-bottom: 50px;}
    .story-hero { height: 280px; position: relative; }
    .story-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
    .back-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); color: white; padding: 10px 15px; border-radius: 50px; backdrop-filter: blur(5px); font-weight: 600; font-size: 0.9rem;}
    
    .story-header { position: absolute; bottom: 20px; left: 20px; right: 20px; color: white; }
    .story-title { font-family: var(--font-display); font-size: 2rem; line-height: 1.2; margin-bottom: 8px; }
    .story-meta { font-size: 0.85rem; color: #ddd; display: flex; gap: 15px; }

    .story-body { padding: 25px 20px; font-size: 1.05rem; line-height: 1.9; white-space: pre-line; color: var(--text-primary); }

    /* Loading State */
    .loader { text-align: center; padding: 50px; color: var(--accent); font-size: 1.2rem; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">📖 <span>গল্পের আসর</span></div>
    <button class="theme-btn" onclick="toggleTheme()">☀️</button>
  </nav>

  <!-- LOADING SPINNER -->
  <div id="loader" class="loader">গল্প লোড হচ্ছে... ⏳</div>

  <!-- ================= HOME VIEW ================= -->
  <div id="home-view" style="display: none;">
    <div class="hero">
      <h1>আপনার পছন্দের <span>গল্প</span> পড়ুন</h1>
      <p>সেরা বাংলা গল্পের বিশাল কালেকশন</p>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 গল্পের নাম খুঁজুন...">
    
    <div class="filter-scroll" id="filters">
      <button class="filter-tab active" onclick="filterStories('all')">সব গল্প</button>
      <button class="filter-tab" onclick="filterStories('Horror')">ভৌতিক</button>
      <button class="filter-tab" onclick="filterStories('Love')">প্রেম</button>
      <button class="filter-tab" onclick="filterStories('Islamic')">ইসলামিক</button>
    </div>

    <div class="grid" id="storyGrid"></div>
  </div>

  <!-- ================= STORY VIEW ================= -->
  <div id="story-view">
    <div class="story-hero">
      <img id="s-img" src="" alt="">
      <button class="back-btn" onclick="goHome()">← ফিরে যান</button>
      <div class="story-header">
        <h1 class="story-title" id="s-title"></h1>
        <div class="story-meta">
          <span id="s-date"></span>
          <span id="s-views"></span>
        </div>
      </div>
    </div>
    <div class="story-body" id="s-content"></div>
  </div>

  <script>
    let stories = [];
    let currentCategory = 'all';

    // 1. Theme Toggle Logic
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.theme-btn').textContent = isDark ? '🌙' : '☀️';
    }

    // 2. Fetch Data from JSON
    async function loadData() {
      try {
        const response = await fetch('stories.json');
        if (!response.ok) throw new Error('File not found');
        stories = await response.json();
        
        document.getElementById('loader').style.display = 'none';
        checkURL(); // Decide whether to show Home or Story based on link
      } catch (error) {
        document.getElementById('loader').innerHTML = '❌ stories.json ফাইলটি পাওয়া যাচ্ছে না। দয়া করে লোকাল সার্ভারে রান করুন।';
      }
    }

    // 3. App Router (SPA logic for mobile back button)
    window.onpopstate = checkURL; // Detect browser/mobile back button

    function checkURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (id) {
        openStoryUI(parseInt(id));
      } else {
        openHomeUI();
      }
    }

    function goHome() {
      history.pushState(null, '', window.location.pathname); // Remove ?id from URL
      openHomeUI();
    }

    function goToStory(id) {
      history.pushState(null, '', '?id=' + id); // Add ?id to URL
      openStoryUI(id);
    }

    // 4. Render Home Interface
    function openHomeUI() {
      document.getElementById('story-view').style.display = 'none';
      document.getElementById('home-view').style.display = 'block';
      window.scrollTo(0, 0);
      renderGrid();
    }

    function renderGrid() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = stories.filter(s => {
        const matchCat = currentCategory === 'all' || s.category === currentCategory;
        const matchSearch = s.title.toLowerCase().includes(query);
        return matchCat && matchSearch;
      });

      const grid = document.getElementById('storyGrid');
      
      if(filtered.length === 0) {
        grid.innerHTML = '<p style="color:var(--text-secondary); text-align:center; grid-column:1/-1;">কোনো গল্প পাওয়া যায়নি!</p>';
        return;
      }

      grid.innerHTML = filtered.map(s => `
        <div class="card" onclick="goToStory(${s.id})">
          <img src="${s.thumbnail}" class="card-img" alt="${s.title}">
          <div class="card-content">
            <span class="card-tag">${s.category}</span>
            <h3 class="card-title">${s.title}</h3>
            <p class="card-desc">${s.description}</p>
          </div>
        </div>
      `).join('');
    }

    // 5. Search and Filter
    document.getElementById('searchInput').addEventListener('input', renderGrid);

    function filterStories(cat) {
      currentCategory = cat;
      document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderGrid();
    }

    // 6. Render Single Story Interface
    function openStoryUI(id) {
      const story = stories.find(s => s.id === id);
      if (!story) return goHome();

      document.getElementById('home-view').style.display = 'none';
      document.getElementById('story-view').style.display = 'block';
      window.scrollTo(0, 0);

      document.getElementById('s-img').src = story.thumbnail;
      document.getElementById('s-title').textContent = story.title;
      document.getElementById('s-date').textContent = `📅 ` + story.date;
      document.getElementById('s-views').textContent = `👁 ` + story.views + ` ভিউ`;
      document.getElementById('s-content').textContent = story.content;
    }

    // Initialize the App
    loadData();
  </script>
</body>
</html>
